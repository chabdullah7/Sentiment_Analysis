name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:

jobs:
  project-testing:

    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT CODE
      # =========================
      - name: Checkout code
        uses: actions/checkout@v3

      # =========================
      # SETUP PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # =========================
      # CACHE PIP
      # =========================
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[s3]==3.48.3
          pip install "pathspec<0.12.0"

      # =========================
      # CONFIGURE AWS CREDENTIALS
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # SET ENV VARIABLES
      # =========================
      - name: Set environment variables
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV
          echo "REPO_OWNER=chabdullah7" >> $GITHUB_ENV
          echo "REPO_NAME=Sentiment_Analysis" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/chabdullah7/Sentiment_Analysis.mlflow" >> $GITHUB_ENV

      # =========================
      # DEBUG AWS AUTH
      # =========================
      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      # =========================
      # RUN DVC PIPELINE
      # =========================
      - name: Run DVC Pipeline
        run: |
          dvc repro

      # =========================
      # RUN TESTS
      # =========================
      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      # =========================
      # PROMOTE MODEL
      # =========================
      - name: Promote model to production
        if: success()
        run: |
          python scripts/promote_model.py

      # =========================
      # LOGIN TO AWS ECR
      # =========================
      - name: Login to AWS ECR
        if: success()
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # =========================
      # BUILD DOCKER IMAGE
      # =========================
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:latest .

      # =========================
      # TAG DOCKER IMAGE
      # =========================
      - name: Tag Docker image
        run: |
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # =========================
      # PUSH IMAGE TO ECR
      # =========================
      - name: Push Docker image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # =========================
      # VERIFY DOCKER
      # =========================
      - name: Check Docker Authentication
        run: docker info