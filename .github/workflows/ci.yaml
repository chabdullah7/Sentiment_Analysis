name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout code
      # =========================
      - name: Checkout code
        uses: actions/checkout@v3

      # =========================
      # Setup Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # =========================
      # Cache pip
      # =========================
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # =========================
      # Install dependencies (clean)
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[s3]

      # =========================
      # Set environment (IMPORTANT FIX)
      # =========================
      - name: Set environment variables
        run: |
          echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "REPO_OWNER=chabdullah7" >> $GITHUB_ENV
          echo "REPO_NAME=Sentiment_Analysis" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/chabdullah7/Sentiment_Analysis.mlflow" >> $GITHUB_ENV

      # =========================
      # Run DVC Pipeline
      # =========================
      - name: Run DVC Pipeline
        run: |
          dvc repro

      # =========================
      # Run tests (SAFE IMPORT FIX)
      # =========================
      - name: Run FastAPI tests
        run: |
          python -m unittest discover -s tests -p "*.py"

      # =========================
      # Promote model
      # =========================
      - name: Promote model to production
        if: success()
        run: |
          python scripts/promote_model.py