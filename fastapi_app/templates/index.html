<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>
</head>
<body>

<h1>Sentiment Analysis</h1>

<form action="/predict" method="post">
    <textarea name="text"></textarea>
    <button type="submit">Predict</button>
</form>

{% if result is not none %}
    <h2>
        {% if result == 1 %}
            Positive 😊
        {% else %}
            Negative 😞
        {% endif %}
    </h2>
{% endif %}

</body>
</html>
